<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind — Deus Ex Crust</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 240px; min-width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
#sidebar-header { padding: 16px; font-size: 14px; font-weight: 600; color: #58a6ff; border-bottom: 1px solid #30363d; letter-spacing: 1px; text-transform: uppercase; }
#workspace-list { flex: 1; overflow-y: auto; }
.ws-tab { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; transition: background 0.15s; font-size: 13px; }
.ws-tab:hover { background: #1c2128; }
.ws-tab.active { background: #1f6feb22; border-left: 3px solid #58a6ff; }
.ws-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ws-dot.idle { background: #79bbff; box-shadow: 0 0 8px #58a6ffaa; }
.ws-dot.running { background: #3fb950; box-shadow: 0 0 6px #3fb95088; }
.ws-dot.connecting { background: #d29922; box-shadow: 0 0 6px #d2992288; }
.ws-dot.error { background: #f85149; box-shadow: 0 0 6px #f8514988; }
.ws-dot.stopped { background: #484f58; }
.ws-dot.unknown { background: #484f58; }
.ws-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.ws-toggle { width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background 0.2s; outline: none; }
.ws-toggle.on { background: #238636; }
.ws-toggle.off { background: #484f58; }
.ws-toggle::after { content: ''; position: absolute; top: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.2s; }
.ws-toggle.on::after { left: 18px; }
.ws-toggle.off::after { left: 2px; }
.ws-toggle:hover { opacity: 0.85; }

/* Main panel */
#main { flex: 1; display: flex; flex-direction: column; }
#main-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 14px; }
#workspace-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#ws-header { padding: 14px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
#ws-header .ws-dot { width: 10px; height: 10px; }

/* Log stream */
#log-container { flex: 1; overflow-y: auto; padding: 12px 20px; background: #010409; }
#log-output .chat-entry { padding: 8px 12px; margin-bottom: 12px; border-radius: 6px; background: #161b22; border-left: 3px solid #30363d; }
#log-output .chat-entry.prompt-msg { border-left-color: #58a6ff; }
#log-output .chat-entry.dm-msg { border-left-color: #3fb950; }
#log-output .chat-entry.response-msg { border-left-color: #e6edf3; }
#log-output .chat-entry.system-msg { border-left-color: #484f58; background: transparent; }
.chat-meta { font-size: 11px; margin-bottom: 4px; }
.chat-meta .chat-time { color: #484f58; margin-right: 6px; }
.chat-meta .chat-sender { font-weight: 700; }
.chat-meta .chat-sender.prompt-sender { color: #58a6ff; }
.chat-meta .chat-sender.dm-sender { color: #3fb950; }
.chat-meta .chat-sender.response-sender { color: #e6edf3; }
.chat-meta .chat-sender.system-sender { color: #484f58; }
.chat-body { white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.6; color: #c9d1d9; font-weight: 400; }
.chat-entry.system-msg .chat-body { color: #484f58; font-size: 11px; font-style: italic; }
#log-output .chat-entry.emergency-msg { border-left-color: #f85149; }
#log-output .chat-entry.emergency-msg .chat-body { color: #f85149; font-style: italic; font-size: 11px; }
#log-output .chat-entry.emergency-msg .chat-sender { color: #f85149; }

/* Input bar */
#input-bar { padding: 12px 20px; border-top: 1px solid #30363d; display: flex; gap: 10px; }
#msg-input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-family: inherit; font-size: 13px; outline: none; resize: none; overflow-y: hidden; line-height: 1.4; }
#msg-input:focus { border-color: #58a6ff; }
#send-btn { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
#send-btn:hover { background: #2ea043; }
#send-btn:disabled { opacity: 0.5; cursor: default; }
#emergency-btn { background: #da3633; color: #fff; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
#emergency-btn:hover { background: #f85149; }
#emergency-btn:disabled { opacity: 0.5; cursor: default; }

/* Message separator */
.log-divider { border: none; border-top: 1px solid #30363d; margin: 12px 0; }
.log-divider-time { color: #484f58; font-size: 11px; margin-bottom: 4px; }

/* Debug section */
#debug-toggle { background: none; border: 1px solid #30363d; border-radius: 4px; color: #484f58; font-family: inherit; font-size: 11px; padding: 4px 10px; cursor: pointer; margin: 8px 20px; }
#debug-toggle:hover { color: #8b949e; border-color: #484f58; }
#debug-section { display: none; padding: 0 20px 8px; }
#debug-section.open { display: block; }
#debug-section pre { font-size: 11px; line-height: 1.4; color: #484f58; white-space: pre-wrap; word-break: break-all; }

/* Copy button */
#log-container { position: relative; }
#copy-log-btn { position: absolute; top: 8px; right: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 4px; color: #484f58; cursor: pointer; padding: 4px 6px; font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.15s; z-index: 1; }
#log-container:hover #copy-log-btn { opacity: 1; }
#copy-log-btn:hover { color: #c9d1d9; border-color: #484f58; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Mind</div>
  <div id="workspace-list"></div>
</div>

<div id="main">
  <div id="main-empty">Select a workspace</div>
  <div id="workspace-view">
    <div id="ws-header"><span class="ws-dot" id="ws-header-dot"></span><span id="ws-header-name"></span></div>
    <div id="log-container"><button id="copy-log-btn" title="Copy log">&#x1f4cb;</button><div id="log-output"></div></div>

    <div id="input-bar">
      <textarea id="msg-input" placeholder="Send a message…" rows="1"></textarea>
      <button id="send-btn">Send</button>
      <button id="emergency-btn">Emergency</button>
    </div>
  </div>
</div>

<script>
let activeId = null;

const workspaceList = document.getElementById('workspace-list');
const mainEmpty = document.getElementById('main-empty');
const workspaceView = document.getElementById('workspace-view');
const wsHeaderDot = document.getElementById('ws-header-dot');
const wsHeaderName = document.getElementById('ws-header-name');
const logOutput = document.getElementById('log-output');
const logContainer = document.getElementById('log-container');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

async function fetchWorkspaces() {
  try {
    const res = await fetch('/api/workspaces');
    if (!res.ok) return;
    const data = await res.json();
    const workspaces = Array.isArray(data) ? data : (data.workspaces || []);
    renderWorkspaces(workspaces);
  } catch {}
}

function renderWorkspaces(workspaces) {
  workspaceList.innerHTML = '';
  for (const ws of workspaces) {
    const tab = document.createElement('div');
    tab.className = 'ws-tab' + (ws.id === activeId ? ' active' : '');
    const status = ws.status || (ws.running ? 'unknown' : 'stopped');
    const isOn = ws.enabled !== false && ws.running !== false;

    const dot = document.createElement('span');
    dot.className = 'ws-dot ' + status;

    const name = document.createElement('span');
    name.className = 'ws-name';
    name.textContent = ws.name || ws.id;

    const toggle = document.createElement('button');
    toggle.className = 'ws-toggle ' + (isOn ? 'on' : 'off');
    toggle.title = isOn ? 'Stop' : 'Start';
    toggle.onclick = async (e) => {
      e.stopPropagation();
      toggle.disabled = true;
      const action = isOn ? 'stop' : 'start';
      try {
        await fetch(`/api/workspaces/${ws.id}/${action}`, { method: 'POST' });
      } catch {}
      toggle.disabled = false;
      fetchWorkspaces();
    };

    tab.appendChild(dot);
    tab.appendChild(name);
    tab.appendChild(toggle);
    tab.onclick = () => selectWorkspace(ws);
    workspaceList.appendChild(tab);
    // Update header dot if this is the active workspace
    if (ws.id === activeId) {
      wsHeaderDot.className = 'ws-dot ' + status;
    }
  }
}

function selectWorkspace(ws) {
  if (activeId === ws.id) return;
  activeId = ws.id;
  const status = ws.status || (ws.running ? 'unknown' : 'stopped');
  mainEmpty.style.display = 'none';
  workspaceView.style.display = 'flex';
  wsHeaderName.textContent = ws.name || ws.id;
  wsHeaderDot.className = 'ws-dot ' + status;
  // Mark active tab
  document.querySelectorAll('.ws-tab').forEach((t, i) => t.classList.toggle('active', t.querySelector('.ws-name').textContent === (ws.name || ws.id)));

  loadConversation(ws.id);
  startPolling(ws.id);
}

const seenTimestamps = new Set();
let pollTimer = null;

function startPolling(id) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (activeId === id) loadConversation(id, true);
  }, 3000);
}

async function loadConversation(id, incremental) {
  if (!incremental) {
    logOutput.innerHTML = '';
    seenTimestamps.clear();
  }
  try {
    const res = await fetch(`/api/workspaces/${id}/conversation`);
    if (!res.ok) return;
    const entries = await res.json();
    for (const entry of entries) {
      const dedupKey = `${entry.timestamp}|${entry.type}|${entry.from}|${entry.message}`;
      if (seenTimestamps.has(dedupKey)) continue;
      seenTimestamps.add(dedupKey);
      appendConversationEntry(entry);
    }
  } catch {}
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function appendConversationEntry(entry) {
  const atBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 40;
  const typeClassMap = { prompt: 'prompt-msg', dm: 'dm-msg', response: 'response-msg', system: 'system-msg' };
  const typeClass = typeClassMap[entry.type] || 'response-msg';
  const senderClass = typeClass.replace('-msg', '-sender');

  const isEmergency = entry.type === 'system' && entry.message && entry.message.startsWith('Emergency');

  const el = document.createElement('div');
  el.className = 'chat-entry ' + (isEmergency ? 'emergency-msg' : typeClass);

  const meta = document.createElement('div');
  meta.className = 'chat-meta';

  const time = document.createElement('span');
  time.className = 'chat-time';
  time.textContent = formatTime(entry.timestamp);

  const sender = document.createElement('span');
  sender.className = 'chat-sender ' + senderClass;
  sender.textContent = entry.from || entry.type;

  meta.appendChild(time);
  meta.appendChild(sender);

  const body = document.createElement('div');
  body.className = 'chat-body';
  body.textContent = entry.message;

  el.appendChild(meta);
  el.appendChild(body);
  logOutput.appendChild(el);
  if (atBottom) logContainer.scrollTop = logContainer.scrollHeight;
}

async function sendMessage() {
  const msg = msgInput.value.trim();
  if (!msg || !activeId) return;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  try {
    const res = await fetch(`/api/workspaces/${activeId}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    if (!res.ok) {
      appendConversationEntry({ type: 'system', from: 'system', message: `✗ Failed to send: ${res.status}`, timestamp: Date.now() });
    }
  } catch (e) {
    appendConversationEntry({ type: 'system', from: 'system', message: `✗ Failed to send: ${e.message}`, timestamp: Date.now() });
  }
  sendBtn.disabled = false;
  msgInput.focus();
  fetchWorkspaces();
}

sendBtn.onclick = sendMessage;

const emergencyBtn = document.getElementById('emergency-btn');
emergencyBtn.onclick = async () => {
  if (!activeId) return;
  let msg = msgInput.value.trim();
  if (!msg) msg = prompt('Emergency message:');
  if (!msg) return;
  emergencyBtn.disabled = true;
  msgInput.value = '';
  try {
    const res = await fetch(`/api/workspaces/${activeId}/emergency`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    if (!res.ok) {
      appendConversationEntry({ type: 'system', from: 'system', message: `✗ Emergency failed: ${res.status}`, timestamp: Date.now() });
    }
  } catch (e) {
    appendConversationEntry({ type: 'system', from: 'system', message: `✗ Emergency failed: ${e.message}`, timestamp: Date.now() });
  }
  emergencyBtn.disabled = false;
  msgInput.focus();
};
const messageHistory = [];
let historyIndex = -1;
let historyDraft = '';

msgInput.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === 'ArrowUp' && msgInput.selectionStart === 0 && messageHistory.length > 0) {
    e.preventDefault();
    if (historyIndex === -1) historyDraft = msgInput.value;
    if (historyIndex < messageHistory.length - 1) {
      historyIndex++;
      msgInput.value = messageHistory[messageHistory.length - 1 - historyIndex];
      msgInput.style.height = 'auto'; msgInput.style.height = msgInput.scrollHeight + 'px';
    }
  }
  if (e.key === 'ArrowDown' && msgInput.selectionEnd === msgInput.value.length && historyIndex >= 0) {
    e.preventDefault();
    historyIndex--;
    msgInput.value = historyIndex >= 0 ? messageHistory[messageHistory.length - 1 - historyIndex] : historyDraft;
    msgInput.style.height = 'auto'; msgInput.style.height = msgInput.scrollHeight + 'px';
  }
};
msgInput.oninput = () => { msgInput.style.height = 'auto'; msgInput.style.height = msgInput.scrollHeight + 'px'; };

function esc(s) { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

// Auto-focus message input on keydown
document.addEventListener('keydown', (e) => {
  if (e.target === msgInput) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length === 1) msgInput.focus();
});

// Copy log to clipboard
document.getElementById('copy-log-btn').onclick = () => {
  const text = logOutput.innerText;
  navigator.clipboard.writeText(text);
};

fetchWorkspaces();
setInterval(fetchWorkspaces, 3000);
</script>
</body>
</html>
